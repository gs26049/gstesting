<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>세포 퀴즈</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
</head>
<body>
  <div id="app">
    <header class="app-header">
      <h1 id="quiz-title">퀴즈 로딩 중...</h1>
      <div class="progress-wrap">
        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
        <span id="progress-text" class="progress-text"></span>
      </div>
    </header>

    <main id="quiz-area"></main>

    <footer class="app-footer">
      <button id="btn-hint" class="btn btn-secondary" type="button">힌트 보기</button>
      <button id="btn-submit" class="btn btn-primary" type="button">제출</button>
      <button id="btn-next" class="btn btn-primary hidden" type="button">다음 문제</button>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
